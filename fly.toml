# Fly.io deployment configuration
# Deploy with: fly launch (first time) or fly deploy (updates)
# App name must match your Fly app (e.g. rammerhead.fly.dev -> app = "rammerhead")

app = "rammerhead"

# 512MB to avoid OOM; 256MB was too tight for Node + jsCache
[[vm]]
  memory = "512mb"

# Try IAD (US East) if ams has connection issues
primary_region = "iad"

[build]

[env]
  NODE_ENV = "production"
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  # With 6+ machines, set UPSTASH_REDIS_REST_URL and UPSTASH_REDIS_REST_TOKEN for session affinity (fly-replay).
  min_machines_running = 6
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    hard_limit = 25
    soft_limit = 20

  [http_service.http_options]
    idle_timeout = 300

  # Cache fly-replay decisions by session cookie so only first request per session hits the app
  [[http_service.http_options.replay_cache]]
    path_prefix = "/"
    ttl_seconds = 300
    type = "cookie"
    name = "rh_sid"

  [[http_service.checks]]
    grace_period = "60s"
    interval = "10s"
    method = "GET"
    path = "/health"
    timeout = "5s"
    [http_service.checks.headers]
      X-Forwarded-Proto = "https"
