# Fly.io deployment configuration
# Deploy with: fly launch (first time) or fly deploy (updates)
# App name must match your Fly app (e.g. rammerhead.fly.dev -> app = "rammerhead")

app = "rammerhead"

# 512MB to avoid OOM; 256MB was too tight for Node + jsCache
[[vm]]
  memory = "512mb"

# Try IAD (US East) if ams has connection issues
primary_region = "iad"

[build]

[env]
  NODE_ENV = "production"
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  # Proxy sessions are in-memory/per-instance; use 1 machine so all requests hit the same session store.
  # To scale out, add a shared session store (e.g. Redis) and fly-replay by session ID.
  min_machines_running = 1
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    hard_limit = 25
    soft_limit = 20

  [http_service.http_options]
    idle_timeout = 300

  [[http_service.checks]]
    grace_period = "60s"
    interval = "10s"
    method = "GET"
    path = "/health"
    timeout = "5s"
    [http_service.checks.headers]
      X-Forwarded-Proto = "https"
